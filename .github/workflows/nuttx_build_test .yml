name: Apache NuttX Multiplatform Build

on:
  push:
    branches: [ main, master, release/*, staging ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target_boards:
        description: 'Comma-separated list of boards to build (leave empty for all)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NUTTX_VERSION: "12.6.0"
  NUTTX_APPS_VERSION: "12.6.0"

# ─────────────────────────────────────────────────────────────────────────────
# BUILD MATRIX
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ---------------------------------------------------------------------------
  # 1. Generate the build matrix dynamically
  # ---------------------------------------------------------------------------
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout NuttX
        uses: actions/checkout@v6
        # with:
          # repository: apache/nuttx
          # ref: releases/v${{ env.NUTTX_VERSION }}
          # path: nuttx
        run: |
          curl -L https://www.apache.org/dyn/closer.lua/nuttx/${{ env.NUTTX_VERSION }}/apache-nuttx-${{ env.NUTTX_VERSION }}.tar.gz?action=download -o nuttx.tar.gz
          curl -L https://www.apache.org/dyn/closer.lua/nuttx/${{ env.NUTTX_VERSION }}/apache-nuttx-apps-${{ env.NUTTX_VERSION }}.tar.gz?action=download -o apps.tar.gz
          tar zxf nuttx.tar.gz --one-top-level=nuttx --strip-components 1
          tar zxf apps.tar.gz --one-top-level=apps --strip-components 1
      - name: Generate matrix
        id: set-matrix
        run: |
          # Default boards covering major architectures
          BOARDS=(
            "arm:stm32f4discovery:nsh"
            "arm:nucleo-f446re:nsh"
            "arm:raspberrypi-pico:nsh"
            "arm64:imx93-evk:nsh"
            "risc-v:esp32c3-devkit:nsh"
            "risc-v:rv-virt:nsh"
            "xtensa:esp32:nsh"
            "xtensa:esp32s3-devkit:nsh"
            "x86_64:sim:nsh"
            "x86_64:sim:nsh2"
          )

          # If user supplied boards, use those instead
          if [ -n "${{ github.event.inputs.target_boards }}" ]; then
            IFS=',' read -ra BOARDS <<< "${{ github.event.inputs.target_boards }}"
          fi

          # Build JSON matrix
          MATRIX='{"include":['
          FIRST=true
          for entry in "${BOARDS[@]}"; do
            IFS=':' read -r ARCH BOARD CONFIG <<< "$entry"
            if [ "$FIRST" = true ]; then FIRST=false; else MATRIX+=','; fi
            MATRIX+="{\"arch\":\"$ARCH\",\"board\":\"$BOARD\",\"config\":\"$CONFIG\"}"
          done
          MATRIX+=']}'
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 2. Linux (Ubuntu) build
  # ---------------------------------------------------------------------------
  build-linux:
    name: "Linux │ ${{ matrix.arch }} │ ${{ matrix.board }}:${{ matrix.config }}"
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Install host tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bison flex gperf libncurses-dev u-boot-tools \
            kconfig-frontends genromfs xxd python3-pip \
            gcc-arm-none-eabi binutils-arm-none-eabi \
            gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf \
            gcc-xtensa-lx106 \
            qemu-system-arm qemu-system-misc
          pip3 install pyelftools

      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nuttx-tools
          key: toolchains-${{ matrix.arch }}-${{ runner.os }}-v1
          restore-keys: toolchains-${{ matrix.arch }}-

      - name: Checkout NuttX
        uses: actions/checkout@v6
        with:
          repository: apache/nuttx
          ref: releases/v${{ env.NUTTX_VERSION }}
          path: nuttx

      - name: Checkout NuttX Apps
        uses: actions/checkout@v6
        with:
          repository: apache/nuttx-apps
          ref: releases/v${{ env.NUTTX_APPS_VERSION }}
          path: apps

      - name: Configure NuttX
        working-directory: nuttx
        run: |
          ./tools/configure.sh ${{ matrix.board }}/${{ matrix.config }}

      - name: Build NuttX
        working-directory: nuttx
        run: |
          make -j$(nproc) 2>&1 | tee ../build-${{ matrix.arch }}-${{ matrix.board }}-${{ matrix.config }}.log
          echo "BUILD_STATUS=success" >> $GITHUB_ENV

      - name: Collect artifacts
        if: always()
        working-directory: nuttx
        run: |
          mkdir -p ../artifacts
          for f in nuttx nuttx.bin nuttx.hex nuttx.elf nuttx.map; do
            [ -f "$f" ] && cp "$f" "../artifacts/${{ matrix.board }}-${{ matrix.config }}-$f" || true
          done
          cp ../build-*.log ../artifacts/ 2>/dev/null || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nuttx-linux-${{ matrix.arch }}-${{ matrix.board }}-${{ matrix.config }}
          path: artifacts/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 3. macOS build (native Apple Silicon + x86_64)
  # ---------------------------------------------------------------------------
  build-macos:
    name: "macOS │ ${{ matrix.arch }} │ ${{ matrix.board }}:${{ matrix.config }}"
    needs: setup
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm
            board: stm32f4discovery
            config: nsh
          - arch: risc-v
            board: rv-virt
            config: nsh
          - arch: x86_64
            board: sim
            config: nsh

    steps:
      - name: Install host tools (Homebrew)
        run: |
          brew update
          brew install \
            arm-none-eabi-gcc \
            riscv64-elf-gcc \
            kconfig-frontends \
            genromfs \
            u-boot-tools \
            python3
          pip3 install pyelftools

      - name: Checkout NuttX
        uses: actions/checkout@v6
        with:
          repository: apache/nuttx
          ref: releases/v${{ env.NUTTX_VERSION }}
          path: nuttx

      - name: Checkout NuttX Apps
        uses: actions/checkout@v6
        with:
          repository: apache/nuttx-apps
          ref: releases/v${{ env.NUTTX_APPS_VERSION }}
          path: apps

      - name: Configure & Build
        working-directory: nuttx
        run: |
          ./tools/configure.sh ${{ matrix.board }}/${{ matrix.config }}
          make -j$(sysctl -n hw.logicalcpu) 2>&1 | tee ../build-macos-${{ matrix.board }}.log

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nuttx-macos-${{ matrix.arch }}-${{ matrix.board }}-${{ matrix.config }}
          path: |
            nuttx/nuttx
            nuttx/nuttx.bin
            nuttx/nuttx.hex
            nuttx/*.map
            build-macos-*.log
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 4. Windows build (via MSYS2 / MinGW64)
  # ---------------------------------------------------------------------------
  build-windows:
    name: "Windows │ ${{ matrix.board }}:${{ matrix.config }}"
    needs: setup
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: stm32f4discovery
            config: nsh
          - board: sim
            config: nsh

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-arm-none-eabi-gcc
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pyelftools
            mingw-w64-x86_64-kconfig-frontends
            mingw-w64-x86_64-ncurses
            bison flex

      - name: Checkout NuttX
        uses: actions/checkout@v6
        with:
          repository: apache/nuttx
          ref: releases/v${{ env.NUTTX_VERSION }}
          path: nuttx

      - name: Checkout NuttX Apps
        uses: actions/checkout@v6
        with:
          repository: apache/nuttx-apps
          ref: releases/v${{ env.NUTTX_APPS_VERSION }}
          path: apps

      - name: Configure & Build
        working-directory: nuttx
        run: |
          ./tools/configure.sh ${{ matrix.board }}/${{ matrix.config }}
          make -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nuttx-windows-${{ matrix.board }}-${{ matrix.config }}
          path: |
            nuttx/nuttx
            nuttx/nuttx.bin
            nuttx/nuttx.hex
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 5. Docker-based hermetic build (reproducible, arch-tagged images)
  # ---------------------------------------------------------------------------
  build-docker:
    name: "Docker │ ${{ matrix.arch }} │ ${{ matrix.board }}:${{ matrix.config }}"
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm
            board: stm32f4discovery
            config: nsh
            image: ghcr.io/apache/nuttx/apache-nuttx-ci-linux:latest
          - arch: risc-v
            board: esp32c3-devkit
            config: nsh
            image: ghcr.io/apache/nuttx/apache-nuttx-ci-linux:latest
          - arch: xtensa
            board: esp32
            config: nsh
            image: ghcr.io/apache/nuttx/apache-nuttx-ci-linux:latest

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout NuttX
        uses: actions/checkout@v6
        with:
          repository: apache/nuttx
          ref: releases/v${{ env.NUTTX_VERSION }}
          path: nuttx

      - name: Checkout NuttX Apps
        uses: actions/checkout@v6
        with:
          repository: apache/nuttx-apps
          ref: releases/v${{ env.NUTTX_APPS_VERSION }}
          path: apps

      - name: Configure & Build
        working-directory: nuttx
        run: |
          ./tools/configure.sh ${{ matrix.board }}/${{ matrix.config }}
          make -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nuttx-docker-${{ matrix.arch }}-${{ matrix.board }}-${{ matrix.config }}
          path: |
            nuttx/nuttx
            nuttx/nuttx.bin
            nuttx/nuttx.hex
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 6. Simulation / QEMU smoke tests
  # ---------------------------------------------------------------------------
  test-sim:
    name: "Sim Test │ ${{ matrix.board }}"
    needs: [build-linux]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: sim
            config: nsh
            arch: x86_64

    steps:
      - name: Install QEMU & tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-system-x86 expect

      - name: Download sim binary
        uses: actions/download-artifact@v8
        with:
          name: nuttx-linux-${{ matrix.arch }}-${{ matrix.board }}-${{ matrix.config }}
          path: artifacts/

      - name: Run NuttX sim smoke test
        run: |
          chmod +x artifacts/sim-nsh-nuttx 2>/dev/null || true
          # Basic NSH interaction test via expect script
          cat > smoke.exp <<'EOF'
          #!/usr/bin/expect -f
          set timeout 30
          spawn ./artifacts/sim-nsh-nuttx
          expect "nsh>"
          send "help\r"
          expect "nsh>"
          send "uname -a\r"
          expect "NuttX"
          send "exit\r"
          EOF
          expect smoke.exp && echo "✅ Smoke test passed" || echo "⚠️  Smoke test inconclusive"

  # ---------------------------------------------------------------------------
  # 7. Aggregate results & post summary
  # ---------------------------------------------------------------------------
  summary:
    name: Build Summary
    needs: [build-linux, build-macos, build-windows, build-docker, test-sim]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts/

      - name: Generate summary
        run: |
          echo "# 🚀 NuttX Multiplatform Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux (ubuntu-latest) | ${{ needs.build-linux.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS 14 (Apple Silicon) | ${{ needs.build-macos.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows (MSYS2/MinGW64) | ${{ needs.build-windows.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker (hermetic) | ${{ needs.build-docker.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sim Smoke Tests | ${{ needs.test-sim.result == 'success' && '✅ Pass' || '⚠️ Check' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**NuttX Version:** \`${{ env.NUTTX_VERSION }}\`  " >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload consolidated artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuttx-all-builds-${{ github.sha }}
          path: all-artifacts/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # 8. Release (only on version tags)
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [summary]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download consolidated artifacts
        uses: actions/download-artifact@v8
        with:
          name: nuttx-all-builds-${{ github.sha }}
          path: release-artifacts/

      - name: Zip by platform
        run: |
          cd release-artifacts
          for dir in */; do
            zip -r "../${dir%/}.zip" "$dir"
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "NuttX Build ${{ github.ref_name }}"
          body: |
            ## Apache NuttX Multiplatform Release

            Automated build for tag `${{ github.ref_name }}`.

            ### Included targets
            - **ARM**: STM32F4Discovery, Nucleo-F446RE, Raspberry Pi Pico
            - **ARM64**: i.MX93 EVK
            - **RISC-V**: ESP32-C3, rv-virt
            - **Xtensa**: ESP32, ESP32-S3
            - **x86_64**: Simulator

            ### Build hosts
            - Ubuntu 22.04
            - macOS 14 (Apple Silicon)
            - Windows (MSYS2/MinGW64)
            - Docker (hermetic)
          files: "*.zip"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
